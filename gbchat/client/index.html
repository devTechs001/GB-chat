<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="description" content="GBChat - Ultimate Messaging Platform" />

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GBChat" />
    <meta name="application-name" content="GBChat" />
    <meta name="msapplication-TileColor" content="#0ea5e9" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192x192.png" />

    <!-- Favicon for iOS -->
    <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>GBChat - Ultimate Messaging</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Initialize theme from localStorage before React renders
      try {
        const themeStorage = localStorage.getItem('theme-storage');
        if (themeStorage) {
          const { state } = JSON.parse(themeStorage);
          if (state && state.theme) {
            const themes = {
              light: 'light',
              dark: 'dark',
              'gb-green': 'dark theme-gb-green',
              amoled: 'dark theme-amoled',
              midnight: 'dark midnight',
              ocean: 'dark ocean',
              'ocean-deep': 'dark theme-ocean-deep',
              sunset: 'dark sunset',
              'sunset-glow': 'dark theme-sunset-glow',
              forest: 'dark forest',
              cyberpunk: 'dark cyberpunk',
              neon: 'dark theme-neon',
              glass: 'dark theme-glass',
              rose: 'dark theme-rose',
            };
            const themeClass = themes[state.theme] || 'light';
            document.documentElement.className = themeClass;
          }
        }
      } catch (e) {
        // Fall back to light theme if parsing fails
        document.documentElement.className = 'light';
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

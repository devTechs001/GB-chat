# Netlify Configuration for GBChat Client
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "cd client && npm install && npm run build"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# Environment variables - MUST be set in Netlify dashboard
# VITE_API_URL = "https://your-backend.onrender.com/api"
# VITE_SOCKET_URL = "https://your-backend.onrender.com"

# SPA Redirect for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# API Proxy to Render backend
[[redirects]]
  from = "/api/*"
  to = "https://gbchat-enterprise.onrender.com/api/:splat"
  status = 200
  force = true

# WebSocket Proxy
[[redirects]]
  from = "/socket.io/*"
  to = "https://gbchat-enterprise.onrender.com/socket.io/:splat"
  status = 200
  force = true

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://gbchat-enterprise.onrender.com wss://gbchat-enterprise.onrender.com;"

# Cache Static Assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# PWA Headers
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "public, max-age=0"

# Development server
[dev]
  command = "npm run dev"
  port = 5173
  publish = "dist"
  autoLaunch = false

# Plugins
[[plugins]]
  package = "@netlify/plugin-lighthouse"

# Context-specific settings
[context.production.environment]
  VITE_API_URL = "https://gbchat-enterprise.onrender.com/api"
  VITE_SOCKET_URL = "https://gbchat-enterprise.onrender.com"
  VITE_ENABLE_ANALYTICS = "true"

[context.deploy-preview.environment]
  VITE_API_URL = "https://gbchat-enterprise.onrender.com/api"
  VITE_SOCKET_URL = "https://gbchat-enterprise.onrender.com"
  VITE_ENABLE_ANALYTICS = "false"

[context.branch-deploy.environment]
  VITE_API_URL = "https://gbchat-enterprise.onrender.com/api"
  VITE_SOCKET_URL = "https://gbchat-enterprise.onrender.com"

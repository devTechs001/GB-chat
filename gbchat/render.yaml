services:
  # Backend API Server
  - type: web
    name: gbchat-server
    env: node
    region: oregon
    plan: starter
    branch: main
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1

  # Frontend Client
  - type: web
    name: gbchat-client
    env: static
    region: oregon
    plan: starter
    branch: main
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block

  # Redis (for sessions and caching)
  - type: redis
    name: gbchat-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: noeviction

databases:
  # MongoDB Atlas (external - add connection string in environment variables)
  # Render doesn't have native MongoDB, so use MongoDB Atlas free tier
  # Add MONGODB_URI to environment variables
